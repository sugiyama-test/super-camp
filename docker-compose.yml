services:
  db:
    image: postgres:16-alpine
    container_name: supercamp-db
    environment:
      POSTGRES_USER: supercamp
      POSTGRES_PASSWORD: supercamp
      POSTGRES_DB: supercamp_dev
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supercamp"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supercamp-api
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgres://supercamp:supercamp@db:5432/supercamp_dev?sslmode=disable
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["air", "-c", ".air.toml"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supercamp-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev"]

  db-test:
    image: postgres:16-alpine
    container_name: supercamp-db-test
    environment:
      POSTGRES_USER: supercamp
      POSTGRES_PASSWORD: supercamp
      POSTGRES_DB: supercamp_test
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supercamp"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
